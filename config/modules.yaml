verify_checks:
  - selection_var: INSTALL_CORE_HOMEBREW
    kind: cmd
    arg: "brew"
    label: "Homebrew available"
    severity: fail
  - selection_var: INSTALL_CORE_GIT
    kind: cmd
    arg: "git"
    label: "Git available"
    severity: fail
  - selection_var: INSTALL_CORE_GITHUB_CLI
    kind: cmd
    arg: "gh"
    label: "GitHub CLI available"
    severity: fail
  - selection_var: INSTALL_CORE_MISE
    kind: cmd
    arg: "mise"
    label: "mise available"
    severity: fail
  - selection_var: INSTALL_PYTHON_RUNTIME
    kind: cmd
    arg: "python"
    label: "Python available"
    severity: fail
  - selection_var: INSTALL_PYTHON_UV
    kind: cmd
    arg: "uv"
    label: "uv available"
    severity: fail
  - selection_var: INSTALL_NODE_RUNTIME
    kind: cmd
    arg: "node"
    label: "Node available"
    severity: fail
  - selection_var: INSTALL_NODE_RUNTIME
    kind: cmd
    arg: "npm"
    label: "npm available"
    severity: fail
  - selection_var: INSTALL_NODE_PNPM
    kind: cmd
    arg: "pnpm"
    label: "pnpm available"
    severity: fail
  - selection_var: INSTALL_GO_RUNTIME
    kind: cmd
    arg: "go"
    label: "Go available"
    severity: fail
  - selection_var: INSTALL_JAVA_RUNTIME
    kind: cmd
    arg: "java"
    label: "Java available"
    severity: fail
  - selection_var: INSTALL_JAVA_MAVEN
    kind: cmd
    arg: "mvn"
    label: "Maven available"
    severity: fail
  - selection_var: INSTALL_JAVA_GRADLE
    kind: cmd
    arg: "gradle"
    label: "Gradle available"
    severity: fail
  - selection_var: INSTALL_CONTAINERS_COLIMA
    kind: cmd
    arg: "colima"
    label: "Colima available"
    severity: fail
  - selection_var: INSTALL_CONTAINERS_DOCKER_CLI
    kind: cmd
    arg: "docker"
    label: "Docker CLI available"
    severity: fail
  - selection_var: INSTALL_CONTAINERS_COLIMA
    kind: colima_running
    arg: ""
    label: "Colima running"
    severity: warn
  - selection_var: INSTALL_CONTAINERS_DOCKER_CLI
    kind: docker_reachable
    arg: ""
    label: "Docker daemon reachable"
    severity: warn
  - selection_var: INSTALL_SHELL_TMUX
    kind: cmd
    arg: "tmux"
    label: "tmux available"
    severity: warn
  - selection_var: INSTALL_EDITOR_NEOVIM
    kind: cmd
    arg: "nvim"
    label: "Neovim available"
    severity: warn
  - selection_var: INSTALL_EDITOR_VSCODE_CLI
    kind: cmd
    arg: "code"
    label: "VS Code CLI available"
    severity: warn
  - selection_var: INSTALL_EDITOR_INTELLIJ_CLI
    kind: cmd
    arg: "idea"
    label: "IntelliJ CLI helper available"
    severity: warn
  - selection_var: INSTALL_AI_CODEX_CLI
    kind: cmd
    arg: "codex"
    label: "Codex CLI available"
    severity: warn
  - selection_var: INSTALL_AI_CURSOR_CLI
    kind: cursor_cli
    arg: ""
    label: "Cursor CLI available"
    severity: warn
  - selection_var: INSTALL_AI_CODEX_APP
    kind: dir
    arg: "/Applications/Codex.app"
    label: "Codex app present"
    severity: warn
  - selection_var: INSTALL_AI_CURSOR_EDITOR
    kind: dir
    arg: "/Applications/Cursor.app"
    label: "Cursor editor present"
    severity: warn
  - selection_var: INSTALL_AI_WINDSURF_EDITOR
    kind: dir
    arg: "/Applications/Windsurf.app"
    label: "Windsurf editor present"
    severity: warn
  - selection_var: INSTALL_SHELL_ZSH_BASELINE
    kind: file
    arg: "$HOME/.config/zsh/.zshrc"
    label: "Managed zsh bootstrap present"
    severity: fail
  - selection_var: INSTALL_SHELL_TMUX
    kind: file
    arg: "$HOME/.config/tmux/tmux.conf"
    label: "Managed tmux config present"
    severity: fail
  - selection_var: INSTALL_EDITOR_NEOVIM
    kind: file
    arg: "$HOME/.config/nvim/plugin/bootstrap.vim"
    label: "Managed Neovim bootstrap present"
    severity: fail
  - selection_var: INSTALL_CONFIG_SSH_BASELINE
    kind: file
    arg: "$HOME/.ssh/config"
    label: "SSH config present"
    severity: fail
