    depends_on: [container-colima]
  - id: container-docker-verify
    group: container
    script: docker-verify
    selection_var: INSTALL_CONTAINERS_DOCKER_CLI
    enabled_profiles: [base, full]
    depends_on: [container-docker-cli, container-colima, container-buildx, container-compose]
  - id: quality-shellcheck
    group: quality
