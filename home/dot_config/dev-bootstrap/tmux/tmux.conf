# dev-bootstrap managed tmux baseline

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g history-limit 100000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g escape-time 10
set -g focus-events on

set -g status-keys vi
setw -g mode-keys vi

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.config/dev-bootstrap/tmux/tmux.conf \; display-message "tmux config reloaded"

bind | split-window -h
bind - split-window -v

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g status-position bottom
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100

set -g status-left "#S "
set -g status-right "%Y-%m-%d %H:%M "

if-shell '[ -f ~/.config/dev-bootstrap/tmux/local.conf ]' 'source-file ~/.config/dev-bootstrap/tmux/local.conf'
