# mac-dev-setup managed tmux config (~/.tmux.conf)

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ",xterm-*:clipboard"

set -g history-limit 100000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g escape-time 10
set -g focus-events on
set -g allow-passthrough on
set -s set-clipboard external
set -s copy-command 'pbcopy'

set -g status-keys vi
setw -g mode-keys vi

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

bind | split-window -h
bind - split-window -v

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g status-position bottom
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100

if-shell 'defaults read -g AppleInterfaceStyle >/dev/null 2>&1' \
  "set -g status-style 'fg=#DEDEDE,bg=#1E1E1E'; set -g message-style 'fg=#FFFFFF,bg=#3478F6'; set -g mode-style 'fg=#FFFFFF,bg=#3478F6'; set -g pane-border-style 'fg=#444444'; set -g pane-active-border-style 'fg=#3478F6'; set -g window-status-style 'fg=#8C8C8C,bg=#1E1E1E'; set -g window-status-current-style 'fg=#FFFFFF,bg=#3478F6,bold'; set -g window-status-bell-style 'fg=#FFFFFF,bg=#EC5F5D,bold'" \
  "set -g status-style 'fg=#272727,bg=#F7F7F7'; set -g message-style 'fg=#FFFFFF,bg=#3477F7'; set -g mode-style 'fg=#000000,bg=#BAD6FB'; set -g pane-border-style 'fg=#D9D9D9'; set -g pane-active-border-style 'fg=#3477F7'; set -g window-status-style 'fg=#989899,bg=#F7F7F7'; set -g window-status-current-style 'fg=#FFFFFF,bg=#3477F7,bold'; set -g window-status-bell-style 'fg=#FFFFFF,bg=#CE4745,bold'"

set -g status-left "#S "
set -g status-right "%Y-%m-%d %H:%M "

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

if-shell '[ -f ~/.tmux.local.conf ]' 'source-file ~/.tmux.local.conf'
run '~/.tmux/plugins/tpm/tpm'
