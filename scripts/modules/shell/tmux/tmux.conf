# mac-dev-setup managed tmux config (~/.tmux.conf)

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ",xterm-*:clipboard"

set -g history-limit 100000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g escape-time 10
set -g focus-events on
set -g allow-passthrough on
set -s set-clipboard external
set -s copy-command 'pbcopy'

set -g status-keys vi
setw -g mode-keys vi

# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

set -g prefix C-b
bind C-b send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# bind | split-window -h
# bind - split-window -v

# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# bind -T copy-mode-vi v send -X begin-selection
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel
# bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel
# bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel

# bind -r H resize-pane -L 5
# bind -r J resize-pane -D 5
# bind -r K resize-pane -U 5
# bind -r L resize-pane -R 5

set -g status-position bottom
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100

set -g status-style 'fg=#BCBEC4,bg=#191A1C'
set -g message-style 'fg=#DFE1E5,bg=#27282B'
set -g mode-style 'fg=#191A1C,bg=#56A8F5'
set -g pane-border-style 'fg=#43454A'
set -g pane-active-border-style 'fg=#548AF7'
set -g window-status-style 'fg=#6F737A,bg=#191A1C'
set -g window-status-current-style 'fg=#DFE1E5,bg=#2B2D30,bold'
set -g window-status-bell-style 'fg=#191A1C,bg=#F75464,bold'

set -g status-left "#S "
set -g status-right "%Y-%m-%d %H:%M "

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

if-shell '[ -f ~/.tmux.local.conf ]' 'source-file ~/.tmux.local.conf'
run '~/.tmux/plugins/tpm/tpm'
