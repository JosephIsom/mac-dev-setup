# Managed by mac-dev-setup local-edge.
# Safe to edit locally. setup will not overwrite a changed file.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: __LOCAL_EDGE_KIND_CLUSTER_NAME__
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: __LOCAL_EDGE_KIND_INGRESS_HTTP_PORT__
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 443
        hostPort: __LOCAL_EDGE_KIND_INGRESS_HTTPS_PORT__
        listenAddress: "127.0.0.1"
        protocol: TCP
