apiVersion: v1
kind: Namespace
metadata:
  name: local-edge-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: work-demo
  namespace: local-edge-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: work-demo
  template:
    metadata:
      labels:
        app: work-demo
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-listen=:5678"
            - "-text=work-demo.localhost via kind ingress"
          ports:
            - containerPort: 5678
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: work-demo
  namespace: local-edge-demo
spec:
  selector:
    app: work-demo
  ports:
    - name: http
      port: 80
      targetPort: 5678
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: work-demo
  namespace: local-edge-demo
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: work-demo.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: work-demo
                port:
                  number: 80
