services:
  journal:
    image: hashicorp/http-echo:1.0.0
    command:
      - "-listen=:5678"
      - "-text=journal.localhost via mac-dev-setup local-edge"
    ports:
      - "127.0.0.1:18080:5678"

  notes:
    image: hashicorp/http-echo:1.0.0
    command:
      - "-listen=:5678"
      - "-text=notes.localhost via mac-dev-setup local-edge"
    ports:
      - "127.0.0.1:18081:5678"
